name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pdi2dag:
    name: pdi2dag tests (py ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: pip install -e .[dev]
      - run: python -m pytest -q

  provider:
    name: provider tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
      - name: Install provider (pulls Apache Airflow)
        working-directory: airflow-pentaho-provider
        run: pip install -e .[dev]
      - working-directory: airflow-pentaho-provider
        run: python -m pytest -q

  ui:
    name: Studio UI build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webapp/frontend/package-lock.json
      - working-directory: webapp/frontend
        run: npm ci
      - working-directory: webapp/frontend
        run: npm run build

  versions:
    name: Version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/check_versions.py

# PDI + Airflow + Marquez lab stack.
#
# Airflow UI:  http://localhost:8088  (admin / admin)
#              (8080 and 8090 belong to the Pentaho Server)
# Marquez UI:  http://localhost:3000
# Marquez API: http://localhost:6001
#              (5000-5002 are PDC apps; exactly 6000 is blocked by
#               Chrome as an unsafe port, hence 6001/6002)
# Marquez UI:  http://localhost:3000
#
# Carte runs on the HOST (see LAB-SETUP.md); the Airflow container
# reaches it at host.docker.internal:8081.
#
# Start:  docker compose up -d --build   (first run builds the image)
# Logs:   docker compose logs -f airflow-apiserver
# Stop:   docker compose down          (add -v to reset databases)
#
# Airflow 3.3 runs in Linux containers as separate api-server /
# scheduler / triggerer / dag-processor services (not `standalone`),
# each restart: always — a crashed process exits its container and
# Docker restarts it, and `always` (unlike `unless-stopped`) also brings
# them back after a host reboot or docker daemon restart even if they
# were stopped beforehand. Every long-running service carries it,
# databases included: a policy on the app containers alone leaves them
# up with a dead metadata DB behind them. `airflow-init` is the sole
# exception - it is one-shot, so it stays on-failure; `always` would
# restart it forever. The Pentaho provider + OpenLineage/standard/
# fab providers are baked into the image (airflow/Dockerfile), so boots
# are fast and never pip-install at runtime. Windows (the Studio /
# pdi2dag) connects over the REST API v2 (JWT) — Airflow itself never
# runs on Windows.

x-airflow-common: &airflow-common
  # Only airflow-init carries the build block (below) so `up --build`
  # builds the shared image once; the other services just reference it.
  image: pdi-airflow-lab:3.3.0
  environment: &airflow-env
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    # Airflow 3: FAB auth manager gives admin/admin login + the JWT
    # /auth/token endpoint the Studio's REST client (API v2) uses.
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__API_AUTH__JWT_SECRET: pdi-airflow-lab-jwt-secret-change-me
    AIRFLOW__API__EXPOSE_CONFIG: 'true'
    AIRFLOW__OPENLINEAGE__TRANSPORT: '{"type":"http","url":"http://marquez-api:5000","endpoint":"api/v1/lineage"}'
    AIRFLOW__OPENLINEAGE__NAMESPACE: pdi
    # Airflow 3 task workers (Task SDK) reach the *execution API* on the
    # api-server. With separate scheduler/api-server containers the
    # default `localhost:8080` resolves to the scheduler's own container —
    # no api-server there — so every scheduler-triggered task fails with
    # `httpx.ConnectError: Connection refused` and is SIGKILLed at ~8s
    # (while `airflow tasks test`, which runs standalone, works). Point it
    # at the api-server service name.
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
    # Carte/PDI runs on a different machine (Windows 11) — set CARTE_HOST
    # to its LAN IP in .env. Defaults to host.docker.internal for a
    # local Docker Desktop test where Carte is on the Docker host.
    AIRFLOW_CONN_PDI_DEFAULT: '{"conn_type":"pentaho","host":"http://${CARTE_HOST:-host.docker.internal}","port":${CARTE_PORT:-8081},"login":"${PDI_REPO_USER:-admin}","password":"${PDI_REPO_PASSWORD:-password}","extra":{"rep":"${PDI_REPO:-Default}","carte_username":"${CARTE_USER:-cluster}","carte_password":"${CARTE_PASSWORD:-cluster}"}}'
  volumes:
    # Host DAGs folder (workshop + Studio-generated). Override with
    # DAGS_DIR in .env, e.g. an absolute path the Studio deploys into.
    - ${DAGS_DIR:-../../workshop/dags}:/opt/airflow/dags
  extra_hosts:
    - "host.docker.internal:host-gateway"
  restart: always

services:

  airflow-db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 10

  # One-shot: migrate the DB and create the admin user, then exit.
  # Carries the build block for the shared image (built once here).
  airflow-init:
    <<: *airflow-common
    build:
      context: ../..
      dockerfile: lab/docker/airflow/Dockerfile
    image: pdi-airflow-lab:3.3.0
    entrypoint: /bin/bash
    command:
      - -c
      # After the DB is up: create the admin user, then seed a second
      # Carte connection (pdi_cluster) into the metadata DB so it shows
      # in the Studio's connection picker — demonstrating the cluster
      # topology alongside the env-var pdi_default (single server). It
      # points at a cluster *master*; set CLUSTER_HOST/PORT in .env.
      # delete-then-add keeps it idempotent across restarts.
      - >-
        airflow db migrate &&
        (airflow users create --username admin --password admin
        --firstname a --lastname d --role Admin
        --email admin@example.com || true);
        airflow connections delete pdi_cluster >/dev/null 2>&1 || true;
        airflow connections add pdi_cluster --conn-json '{"conn_type":"pentaho","host":"http://${CLUSTER_HOST:-carte-master}","port":${CLUSTER_PORT:-8080},"login":"${PDI_REPO_USER:-admin}","password":"${PDI_REPO_PASSWORD:-password}","extra":{"rep":"${PDI_REPO:-Default}","carte_username":"${CARTE_USER:-cluster}","carte_password":"${CARTE_PASSWORD:-cluster}"}}' || true
    restart: on-failure
    depends_on:
      airflow-db:
        condition: service_healthy

  # Airflow 3: the UI + REST API server (replaces `webserver`).
  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8088:8080"
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/api/v2/monitor/health',timeout=5).status==200 else 1)"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # Airflow 3: the DAG file processor runs as its own service.
  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # Optional containerized Carte (adapted from the How-To course's
  # setup-pentaho image) — no PDI install on the host needed:
  #   docker compose --profile carte up -d --build
  # First build downloads PDI CE 9.4 (~1.5 GB). Host port 8081 keeps the
  # same pdi_default connection (host.docker.internal:8081) working.
  carte:
    build: ./carte
    profiles: ["carte"]
    restart: always
    ports:
      - "8081:8181"
    environment:
      CARTE_USER: cluster
      CARTE_PASSWORD: cluster
    volumes:
      - ./carte/repository:/home/pentaho/repositories

  marquez-db:
    image: postgres:14
    restart: always
    environment:
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
      POSTGRES_DB: marquez
    volumes:
      - marquez-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "marquez"]
      interval: 5s
      retries: 10

  marquez-api:
    image: marquezproject/marquez:0.50.0
    restart: always
    depends_on:
      marquez-db:
        condition: service_healthy
    environment:
      MARQUEZ_PORT: 5000
      MARQUEZ_ADMIN_PORT: 5001
      POSTGRES_HOST: marquez-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: marquez
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
    ports:
      # 5000-5002 are PDC apps; 6000 exactly is Chrome-unsafe (X11)
      - "6001:5000"
      - "6002:5001"

  marquez-web:
    image: marquezproject/marquez-web:0.50.0
    restart: always
    depends_on:
      - marquez-api
    environment:
      MARQUEZ_HOST: marquez-api
      MARQUEZ_PORT: 5000
      WEB_PORT: 3000        # required — image won't listen without it
    ports:
      - "3000:3000"

volumes:
  airflow-db-data:
  marquez-db-data:
